<svg width="100%" height="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="natural-trame" patternUnits="userSpaceOnUse" width="120" height="120">
      
      <!-- Flowing curves -->
      <path d="M0 60 Q30 20, 60 60 T120 60" 
            fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.25"/>
      
      <path d="M0 90 Q40 50, 80 90 T160 90" 
            fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.2"/>
      
      <path d="M0 30 Q50 0, 100 30 T200 30" 
            fill="none" stroke="#94a3b8" stroke-width="0.6" opacity="0.15"/>

      <!-- Small organic dots -->
      <circle cx="20" cy="80" r="1.2" fill="#94a3b8" opacity="0.3"/>
      <circle cx="70" cy="40" r="1" fill="#94a3b8" opacity="0.25"/>
      <circle cx="100" cy="100" r="1.3" fill="#94a3b8" opacity="0.2"/>

    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#natural-trame)" />
</svg>